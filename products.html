<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淘趣集市 - 商品列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="products">
  <header class="site-header">
    <a class="brand" href="index.html">淘趣集市</a>
    <form class="search-form" action="products.html" method="get">
      <input id="listSearchInput" type="search" name="q" placeholder="输入关键词搜索商品">
      <button type="submit">搜索</button>
    </form>
    <nav class="top-nav">
      <a href="index.html">首页</a>
      <a href="products.html" class="active">商品</a>
      <a href="cart.html">购物车 <span id="cartBadge" class="badge">0</span></a>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h1>全部商品</h1>
      <div class="filters">
        <label>
          分类
          <select id="categoryFilter"></select>
        </label>
        <label>
          排序
          <select id="sortFilter">
            <option value="default">默认排序</option>
            <option value="priceAsc">价格从低到高</option>
            <option value="priceDesc">价格从高到低</option>
            <option value="salesDesc">销量优先</option>
          </select>
        </label>
      </div>
      <div id="productsGrid" class="product-grid"></div>
      <p id="emptyState" class="empty-state hidden">没有匹配商品，请换一个关键词试试。</p>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
